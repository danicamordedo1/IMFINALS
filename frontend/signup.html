<!DOCTYPE html>
<html>

<head>

  <title>Sign Up</title>

  <link
    rel="stylesheet"
    href="./style.css"
  >

</head>

<body>

<div class="container">

  <div class="card">

    <h2>Create Account</h2>

    <input
      type="text"
      id="signupUsername"
      placeholder="Username"
    >

    <input
      type="password"
      id="signupPassword"
      placeholder="Password"
    >

    <button onclick="signup()">
      Sign Up
    </button>

    <br><br>

    <a href="index.html">
      Back to Login
    </a>

  </div>

</div>

<script src="./js/app.js"></script>

</body>
</html>
