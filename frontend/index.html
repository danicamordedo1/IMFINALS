<!DOCTYPE html>
<html>
<head>
  <title>HRIS Login</title>

  <link
    rel="stylesheet"
    href="./style.css"
  >
</head>

<body>

<div class="container">

  <div class="card">

    <h2>Login</h2>

    <input
      type="text"
      id="username"
      placeholder="Username"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

    <br><br>

<a href="signup.html" class="create-btn">Create Account</a>
  </div>

</div>

<script src="./js/app.js"></script>

</body>
</html>
