<!DOCTYPE html>
<html>
<head>

  <title>Payroll</title>

  <link
    rel="stylesheet"
    href="./style.css"
  >

</head>

<body>

<div class="container">

  <div class="card">

    <h2>Payroll</h2>

    <input type="text" id="employeeId" placeholder="Employee ID">

    <input type="number" id="basicSalary" placeholder="Basic Salary">

    <input type="number" id="overtimeHours" placeholder="Overtime Hours">

    <button onclick="generatePayroll()">
      Generate Payroll
    </button>

  </div>

</div>

<script src="./js/app.js"></script>

</body>
</html>
